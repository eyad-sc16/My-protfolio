<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Box — Pin &amp; Scrub Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .hero,
    .below {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 2rem;
      font-weight: 700;
    }
    .hero  { background: #16213e; }
    .below { background: #0f3460; }

    .terminal-wrap {
      max-width: 700px;
      width: 90%;
      margin: 0 auto;
    }

    .terminal-box {
      background: #0d1117;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #30363d;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    }

    .terminal-header {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .terminal-header span {
      width: 14px; height: 14px; border-radius: 50%;
    }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .terminal-body {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 220px;
    }

    .phrase {
      font-size: 1rem;
      line-height: 1.6;
      color: #c9d1d9;
      opacity: 0;
      transform: translateY(20px);
    }
    .phrase .icon { margin-right: 8px; }
    .phrase .highlight { color: #58a6ff; }
    .phrase .status { color: #3fb950; font-weight: 600; }
  </style>
</head>
<body>

  <!-- Spacer: scroll down to reach the terminal -->
  <section class="hero">↓ Scroll down ↓</section>

  <!-- ===== Terminal section (this is what gets pinned) ===== -->
  <div class="terminal-wrap">
    <div class="terminal-box">
      <div class="terminal-header">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
      </div>
      <div class="terminal-body">
        <p class="phrase"><span class="icon">➜</span> npm run start-project</p>
        <p class="phrase"><span class="icon">></span> loading value props...</p>
        <p class="phrase"><span class="icon">✓</span> Avg. delivery time: <span class="highlight">7–14 days</span></p>
        <p class="phrase"><span class="icon">✓</span> Mobile-first, works on every screen</p>
        <p class="phrase"><span class="icon">✓</span> Animations built to keep users scrolling</p>
        <p class="phrase"><span class="icon">✓</span> Direct communication, no middlemen</p>
        <p class="phrase"><span class="icon">></span> status: <span class="status">open for new projects</span></p>
      </div>
    </div>
  </div>

  <!-- Spacer: scroll continues after pin releases -->
  <section class="below">↓ Content continues smoothly ↓</section>

  <!-- GSAP + ScrollTrigger via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const phrases   = gsap.utils.toArray(".terminal-body .phrase");
    const terminalBox = document.querySelector(".terminal-box");

    if (phrases.length && terminalBox) {
      gsap.set(phrases, { opacity: 0, y: 20 });

      const tl = gsap.timeline();

      tl.to(phrases, {
        opacity: 1,
        y: 0,
        duration: 1,
        stagger: 0.5,
        ease: "power2.out",
      });

      /* ---- Dynamic scroll distance ---- */
      const SCROLL_PER_PHRASE = 150;               // px of scroll per phrase
      const totalScroll = phrases.length * SCROLL_PER_PHRASE;

      ScrollTrigger.create({
        trigger:    terminalBox,
        start:      "center center",   // pin when box center hits viewport center
        end:        `+=${totalScroll}`, // auto-scales with phrase count
        pin:        true,
        pinSpacing: true,
        scrub:      1,
        anticipatePin: 1,
        animation:  tl,
      });
    }
  </script>

</body>
</html>
